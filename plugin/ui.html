<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: var(--figma-color-text);
      background: var(--figma-color-bg);
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--figma-color-bg-brand);
      color: var(--figma-color-text-onbrand);
    }
    button:hover {
      background: var(--figma-color-bg-brand-hover);
    }
    button.secondary {
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
    }
    button.secondary:hover {
      background: var(--figma-color-bg-tertiary);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #output {
      width: 100%;
      height: 240px;
      padding: 10px;
      margin: 0;
      border: 1px solid var(--figma-color-border);
      border-radius: 6px;
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      font-family: ui-monospace, monospace;
      font-size: 11px;
      line-height: 1.4;
      resize: vertical;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .status {
      margin-top: 8px;
      font-size: 11px;
      color: var(--figma-color-text-secondary);
    }
    .error {
      color: var(--figma-color-text-danger);
    }
  </style>
</head>
<body>
  <h2>Export variables to JSON</h2>
  <p style="margin: 0 0 12px 0; color: var(--figma-color-text-secondary);">
    Exports id, name, collection, resolvedType, valuesByMode, hiddenFromPublishing, and scopes from this file.
  </p>
  <div class="actions">
    <button id="export-btn">Export variables</button>
    <button id="copy-btn" class="secondary" disabled>Copy JSON</button>
  </div>
  <textarea id="output" readonly placeholder="Click “Export variables” to generate JSON…"></textarea>
  <div id="status" class="status"></div>

  <script>
    const output = document.getElementById('output');
    const exportBtn = document.getElementById('export-btn');
    const copyBtn = document.getElementById('copy-btn');
    const statusEl = document.getElementById('status');

    function setStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (isError ? ' error' : '');
    }

    exportBtn.onclick = () => {
      setStatus('Exporting…');
      exportBtn.disabled = true;
      parent.postMessage({ pluginMessage: { type: 'export-variables' } }, '*');
    };

    copyBtn.onclick = () => {
      output.select();
      document.execCommand('copy');
      setStatus('Copied to clipboard.');
    };

    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'export-result') {
        const json = JSON.stringify(msg.data, null, 2);
        output.value = json;
        copyBtn.disabled = false;
        setStatus('Exported ' + msg.data.length + ' variable(s).');
      } else if (msg.type === 'export-error') {
        output.value = '';
        setStatus('Error: ' + msg.message, true);
      }
      exportBtn.disabled = false;
    };
  </script>
</body>
</html>
